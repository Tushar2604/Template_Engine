<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Financial Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-primary:#2563eb;--t-accent:#2563eb;--t-muted:#6b7280;--t-text:#111827;--t-sidebar:#1e3a5f;}</style>
  <style>
    :root{--primary:var(--t-primary);--accent:var(--t-accent);--muted:var(--t-muted);--text:var(--t-text);--sidebar:var(--t-sidebar);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Inter,system-ui,sans-serif;background:#e2e8f0;color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .sheet{width:210mm;min-height:297mm;margin:12px auto;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.12);}
    /* Header strip */
    .header{background:var(--sidebar);color:#fff;padding:22px 28px;display:flex;align-items:center;gap:20px;}
    .photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.3);flex-shrink:0;}
    .photo-placeholder{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.8rem;color:rgba(255,255,255,.5);}
    .hdr-info h1{font-size:1.65rem;font-weight:700;letter-spacing:.04em;margin-bottom:4px;}
    .hdr-info .pro-title{font-size:.85rem;font-weight:600;opacity:.85;margin-bottom:8px;}
    .hdr-contact{display:flex;flex-wrap:wrap;gap:6px 18px;font-size:.72rem;opacity:.87;}
    .hdr-contact span{display:inline-flex;align-items:center;gap:5px;}
    /* Body two-column */
    .body{display:flex;flex:1;}
    .main{flex:1;padding:22px 26px 20px;}
    .sidebar{width:33%;background:#f8fafc;padding:22px 18px 20px;border-left:1px solid #e2e8f0;}
    .sec{margin-bottom:18px;}
    .sec h2{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);border-bottom:2px solid var(--primary);padding-bottom:6px;margin-bottom:11px;}
    .sb-sec{margin-bottom:18px;}
    .sb-sec h2{font-size:.7rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--sidebar);border-bottom:2px solid var(--sidebar);padding-bottom:5px;margin-bottom:10px;}
    .summary{font-size:.79rem;line-height:1.6;color:#374151;}
    .exp{margin-bottom:15px;}
    .r1{display:flex;justify-content:space-between;font-size:.80rem;font-weight:700;color:var(--text);}
    .r1 .dates{font-weight:400;color:var(--muted);font-size:.74rem;}
    .r2{display:flex;justify-content:space-between;font-size:.76rem;margin-top:2px;}
    .r2 .company{font-weight:600;color:var(--primary);}
    .r2 .loc{color:var(--muted);}
    .exp ul{margin:6px 0 0 16px;font-size:.76rem;line-height:1.45;color:#374151;}
    .skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .skill-cell{font-size:.72rem;color:#374151;padding:3px 0;}
    .cert{margin-bottom:10px;}
    .cert h3{font-size:.76rem;font-weight:700;color:#1f2937;margin-bottom:2px;}
    .cert p{font-size:.71rem;color:var(--muted);line-height:1.4;}
    .lang-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.74rem;}
    .dots{display:flex;gap:3px;}
    .dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--primary);background:#fff;}
    .dot.filled{background:var(--primary);}
    @media print{body{background:#fff;}.sheet{box-shadow:none;margin:0;width:100%;min-height:auto;}}
  </style>
</head>
<body>
  <div class="sheet">
    <div class="header">
      <img class="photo" data-cv-photo src="" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
      <div class="photo-placeholder" style="display:none"><i class="fa-solid fa-user"></i></div>
      <div class="hdr-info">
        <h1 data-cv="fullName">Jordan Smith</h1>
        <p class="pro-title" data-cv="professionalTitle"></p>
        <div class="hdr-contact">
          <span><i class="fa-regular fa-envelope"></i><span data-cv="contact.email"></span></span>
          <span><i class="fa-solid fa-phone"></i><span data-cv="contact.phone"></span></span>
          <span><i class="fa-brands fa-linkedin-in"></i><span data-cv="contact.linkedin"></span></span>
          <span><i class="fa-solid fa-location-dot"></i><span data-cv="contact.location"></span></span>
        </div>
      </div>
    </div>
    <div class="body">
      <div class="main">
        <div class="sec">
          <h2>Summary</h2>
          <p class="summary" data-cv="summary"></p>
        </div>
        <div class="sec">
          <h2>Professional Experience</h2>
          <div data-cv-list="experience">
            <div class="exp">
              <div class="r1"><span data-cv-field="title"></span><span class="dates"><span data-cv-field="start"></span> – <span data-cv-field="end"></span></span></div>
              <div class="r2"><span class="company" data-cv-field="company"></span><span class="loc" data-cv-field="location"></span></div>
              <ul data-cv-each="bullets"><li></li></ul>
            </div>
          </div>
        </div>
        <div class="sec">
          <h2>Education</h2>
          <div data-cv-list="education">
            <div class="exp">
              <div class="r1"><span data-cv-field="degree"></span><span class="dates"><span data-cv-field="start"></span> – <span data-cv-field="end"></span></span></div>
              <div class="r2"><span class="company" data-cv-field="school"></span><span class="loc" data-cv-field="location"></span></div>
            </div>
          </div>
        </div>
      </div>
      <aside class="sidebar">
        <div class="sb-sec">
          <h2>Technical Skills</h2>
          <div class="skill-grid" data-cv-skill-cells data-skill-max="12" data-skill-class="skill-cell"></div>
        </div>
        <div class="sb-sec">
          <h2>Certifications</h2>
          <div data-cv-list="certifications">
            <div class="cert">
              <h3 data-cv-field="title"></h3>
              <p data-cv-field="description"></p>
            </div>
          </div>
        </div>
        <div class="sb-sec">
          <h2>Languages</h2>
          <div data-cv-lang-list>
            <div class="lang-row">
              <div><strong data-cv-field="name"></strong> <span style="opacity:.8" data-cv-field="level"></span></div>
              <span class="dots" data-dots></span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
