<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Compact Professional layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-sidebar:#1a3652;--t-accent:#2563eb;--t-muted:#6b7280;--t-accent-2:#3b82f6;--t-teal:#004d4d;--t-cyan:#00a8c5;--t-ink:#111827;}</style>
  <style>
    :root { --accent: var(--t-accent); --ink: var(--t-ink); --muted: var(--t-muted); --accent2: var(--t-accent-2); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Lato, system-ui, sans-serif; background: #e2e2e2; color: var(--ink); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { width: 210mm; min-height: 297mm; margin: 12px auto; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,.1); }

    /* Thin accent bar at top */
    .accent-bar { height: 5px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

    .head { padding: 22px 28px 16px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #e5e7eb; }
    .head-left h1 { font-size: 1.6rem; font-weight: 900; color: var(--ink); letter-spacing: -.01em; }
    .head-left .title { font-size: .82rem; color: var(--accent); font-weight: 700; margin-top: 4px; }
    .head-right { display: grid; grid-template-columns: auto auto; gap: 5px 18px; font-size: .72rem; color: var(--muted); align-items: center; }
    .head-right div { display: flex; align-items: center; gap: 6px; }
    .head-right i { width: 14px; text-align: center; color: var(--accent); font-size: .72rem; }

    .cols { display: flex; }
    .col-l { width: 58%; padding: 18px 20px 20px 28px; border-right: 1px solid #f3f4f6; }
    .col-r { width: 42%; padding: 18px 28px 20px 20px; }

    .sec { margin-bottom: 18px; }
    .sec h2 {
      font-size: .68rem; font-weight: 900; letter-spacing: .14em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 2px solid var(--accent);
    }
    .summary { font-size: .76rem; line-height: 1.55; color: #374151; }
    .exp { margin-bottom: 14px; }
    .exp .role { font-size: .82rem; font-weight: 900; color: var(--ink); }
    .exp .co { font-size: .78rem; font-weight: 700; color: var(--accent); margin-top: 1px; }
    .exp .meta { font-size: .7rem; color: var(--muted); margin-top: 3px; display: flex; gap: 12px; }
    .exp .meta span { display: inline-flex; align-items: center; gap: 4px; }
    .exp .meta i { font-size: .68rem; color: #9ca3af; }
    .exp ul { margin: 5px 0 0 16px; font-size: .74rem; line-height: 1.45; color: #374151; }

    .edu { margin-bottom: 12px; }
    .edu .degree { font-size: .8rem; font-weight: 900; color: var(--ink); }
    .edu .school { font-size: .76rem; font-weight: 700; color: var(--accent); margin-top: 1px; }
    .edu .meta { font-size: .7rem; color: var(--muted); margin-top: 2px; }

    /* Skill bars */
    .skill-list {}
    .skill-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .skill-item .label { font-size: .74rem; font-weight: 700; color: var(--ink); min-width: 100px; }
    .skill-item .track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
    .skill-item .track i { display: block; height: 100%; background: var(--accent); border-radius: 99px; }

    .ach-item { display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-start; }
    .ach-item .ico { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .65rem; flex-shrink: 0; }
    .ach-item h3 { font-size: .76rem; font-weight: 900; color: var(--ink); margin-bottom: 2px; }
    .ach-item p { font-size: .72rem; color: #6b7280; line-height: 1.4; }

    .cert-item { margin-bottom: 8px; }
    .cert-item h3 { font-size: .76rem; font-weight: 900; color: var(--ink); }
    .cert-item p { font-size: .7rem; color: var(--muted); }

    .lang-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: .74rem; }
    .lang-row .name { font-weight: 700; color: var(--ink); min-width: 70px; }
    .lang-row .dots { display: flex; gap: 4px; }
    .lang-row .dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--accent); }
    .lang-row .dot.filled { background: var(--accent); }

    .foot { padding: 10px 28px; display: flex; justify-content: space-between; font-size: .6rem; color: #d1d5db; border-top: 1px solid #f3f4f6; }
    @media print { body{background:#fff;} .sheet{box-shadow:none;margin:0;} }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="accent-bar"></div>
    <header class="head">
      <div class="head-left">
        <h1 data-cv="fullName"></h1>
        <div class="title" data-cv="professionalTitle"></div>
      </div>
      <div class="head-right">
        <div><i class="fa-regular fa-envelope"></i> <span data-cv="contact.email"></span></div>
        <div><i class="fa-solid fa-phone"></i> <span data-cv="contact.phone"></span></div>
        <div><i class="fa-brands fa-linkedin-in"></i> <span data-cv="contact.linkedin"></span></div>
        <div><i class="fa-solid fa-location-dot"></i> <span data-cv="contact.location"></span></div>
      </div>
    </header>
    <div class="cols">
      <div class="col-l">
        <section class="sec">
          <h2>Summary</h2>
          <p class="summary" data-cv="summary"></p>
        </section>
        <section class="sec">
          <h2>Experience</h2>
          <div data-cv-list="experience">
            <div class="exp">
              <div class="role" data-cv-field="title"></div>
              <div class="co" data-cv-field="company"></div>
              <div class="meta">
                <span><i class="fa-regular fa-calendar"></i> <span data-cv-field="start"></span> – <span data-cv-field="end"></span></span>
                <span><i class="fa-solid fa-location-dot"></i> <span data-cv-field="location"></span></span>
              </div>
              <ul data-cv-each="bullets"><li></li></ul>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Education</h2>
          <div data-cv-list="education">
            <div class="edu">
              <div class="degree" data-cv-field="degree"></div>
              <div class="school" data-cv-field="school"></div>
              <div class="meta"><span data-cv-field="start"></span> – <span data-cv-field="end"></span> · <span data-cv-field="location"></span></div>
            </div>
          </div>
        </section>
      </div>
      <div class="col-r">
        <section class="sec">
          <h2>Skills</h2>
          <div class="pills" data-cv-pills data-pill-class="pill"></div>
        </section>
        <section class="sec">
          <h2>Achievements</h2>
          <div data-cv-list="achievements">
            <div class="ach-item">
              <div class="ico"><i data-cv-fa="icon" class="fa-solid fa-star"></i></div>
              <div><h3 data-cv-field="title"></h3><p data-cv-field="description"></p></div>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Certifications</h2>
          <div data-cv-list="certifications">
            <div class="cert-item">
              <h3 data-cv-field="title"></h3>
              <p data-cv-field="description"></p>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Languages</h2>
          <div data-cv-lang-list>
            <div class="lang-row">
              <span class="name" data-cv-field="name"></span>
              <span class="dots" data-dots></span>
            </div>
          </div>
        </section>
      </div>
    </div>
    <div class="foot"><span data-cv="footerUrl"></span><span data-cv="footerBrand"></span></div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
