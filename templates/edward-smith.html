<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Edward Smith</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-primary:#2563eb;--t-accent:#2563eb;--t-muted:#6b7280;--t-text:#111827;--t-sidebar:#1e3a5f;}</style>
  <style>
    :root{--primary:var(--t-primary);--accent:var(--t-accent);--muted:var(--t-muted);--text:var(--t-text);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Inter,system-ui,sans-serif;background:#e2e8f0;color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .sheet{width:210mm;min-height:297mm;margin:12px auto;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.12);}
    /* Banner header */
    .header{padding:20px 28px 16px;border-bottom:3px solid var(--primary);display:flex;align-items:center;gap:18px;}
    .photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);flex-shrink:0;}
    .hdr-text h1{font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:2px;}
    .hdr-contact{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:.71rem;color:var(--muted);margin-top:5px;}
    .hdr-contact span{display:inline-flex;align-items:center;gap:4px;}
    /* Single column body */
    .body{padding:18px 28px 20px;}
    .sec{margin-bottom:17px;}
    .sec h2{font-size:.71rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);border-bottom:1px solid #e2e8f0;padding-bottom:6px;margin-bottom:10px;}
    .summary{font-size:.79rem;line-height:1.6;color:#374151;}
    .exp{margin-bottom:13px;}
    .r1{display:flex;justify-content:space-between;font-size:.80rem;font-weight:700;color:var(--text);}
    .r1 .co{font-weight:400;color:var(--muted);font-size:.76rem;}
    .r2{font-size:.74rem;color:var(--muted);margin-top:1px;}
    .exp ul{margin:5px 0 0 16px;font-size:.76rem;line-height:1.45;color:#374151;}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;}
    .skills-inline{font-size:.77rem;color:#374151;line-height:1.7;}
    .interest-row{font-size:.76rem;color:#374151;}
    .interest-title{font-weight:700;color:var(--text);}
    @media print{body{background:#fff;}.sheet{box-shadow:none;margin:0;width:100%;min-height:auto;}}
  </style>
</head>
<body>
  <div class="sheet">
    <div class="header">
      <img class="photo" data-cv-photo src="" alt="" onerror="this.style.display='none'" />
      <div class="hdr-text">
        <h1 data-cv="fullName">Jordan Smith</h1>
        <div class="hdr-contact">
          <span><i class="fa-regular fa-envelope"></i><span data-cv="contact.email"></span></span>
          <span><i class="fa-solid fa-phone"></i><span data-cv="contact.phone"></span></span>
          <span><i class="fa-brands fa-linkedin-in"></i><span data-cv="contact.linkedin"></span></span>
        </div>
      </div>
    </div>
    <div class="body">
      <div class="sec">
        <h2>Professional Summary</h2>
        <p class="summary" data-cv="summary"></p>
      </div>
      <div class="sec">
        <h2>Professional Experience</h2>
        <div data-cv-list="experience">
          <div class="exp">
            <div class="r1"><span data-cv-field="title"></span><span class="co"><span data-cv-field="company"></span>, <span data-cv-field="location"></span></span></div>
            <div class="r2"><span data-cv-field="start"></span> — <span data-cv-field="end"></span></div>
            <ul data-cv-each="bullets"><li></li></ul>
          </div>
        </div>
      </div>
      <div class="sec">
        <h2>Education</h2>
        <div data-cv-list="education">
          <div class="exp">
            <div class="r1"><span data-cv-field="degree"></span><span class="co"><span data-cv-field="school"></span></span></div>
            <div class="r2"><span data-cv-field="location"></span> &nbsp;|&nbsp; <span data-cv-field="start"></span> — <span data-cv-field="end"></span></div>
          </div>
        </div>
      </div>
      <div class="two-col">
        <div class="sec">
          <h2>Expert-Level Skills</h2>
          <p class="skills-inline" data-cv="skillsInline"></p>
        </div>
        <div class="sec">
          <h2>Certifications</h2>
          <div data-cv-list="certifications">
            <div style="margin-bottom:8px;">
              <div style="font-size:.77rem;font-weight:700" data-cv-field="title"></div>
              <div style="font-size:.72rem;color:var(--muted)" data-cv-field="description"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
