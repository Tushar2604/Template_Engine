<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Case Study Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --muted: #94a3b8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter system-ui sans-serif; background: #0b1220; color: #e2e8f0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { width: 210mm; min-height: 297mm; margin: 12px auto; background: var(--bg); box-shadow: 0 12px 48px rgba(0,0,0,.4); }
    .hero { padding: 32px 36px 28px; background: linear-gradient(135deg, #1e1b4b 0%, var(--bg) 55%); border-bottom: 1px solid rgba(99,102,241,.25); }
    .hero h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
    .hero p.lead { color: var(--muted); font-size: .95rem; max-width: 640px; line-height: 1.55; margin-bottom: 16px; }
    .hero .links { display: flex; flex-wrap: wrap; gap: 14px; font-size: .82rem; }
    .hero .links a { color: #a5b4fc; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .hero .links a:hover { text-decoration: underline; }
    .grid { padding: 24px 36px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .card { background: var(--card); border-radius: 12px; padding: 18px 18px 16px; border: 1px solid rgba(148,163,184,.12); }
    .card h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .card h3 i { color: var(--accent); font-size: .9rem; }
    .card .meta { font-size: .72rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .06em; }
    .card p { font-size: .82rem; line-height: 1.5; color: #cbd5e1; margin-bottom: 10px; }
    .card .link { font-size: .78rem; }
    .card .link a { color: #818cf8; }
    .skills { padding: 0 36px 28px; }
    .skills h2 { font-size: .75rem; letter-spacing: .14em; color: var(--muted); margin-bottom: 12px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { font-size: .72rem; padding: 6px 12px; border-radius: 999px; background: rgba(99,102,241,.15); color: #c7d2fe; border: 1px solid rgba(99,102,241,.35); }
    .foot { padding: 16px 36px 20px; font-size: .65rem; color: #64748b; display: flex; justify-content: space-between; border-top: 1px solid rgba(148,163,184,.15); }
    @media print { body{background:#fff;} .sheet{box-shadow:none;margin:0;} body{color:#000;} .hero{background:#fff;} .card{background:#f8fafc;border:1px solid #e2e8f0;} .card p{color:#334155;} }
  </style>
</head>
<body>
  <div class="sheet">
    <header class="hero">
      <h1 data-cv="fullName"></h1>
      <p class="lead" data-cv="summary"></p>
      <div class="links">
        <a data-profile-link="email" href="#"><i class="fa-regular fa-envelope"></i><span data-cv="contact.email"></span></a>
        <a data-profile-link="linkedin" href="#"><i class="fa-brands fa-linkedin-in"></i><span data-cv="contact.linkedin"></span></a>
        <a data-profile-link="github" href="#"><i class="fa-brands fa-github"></i><span data-cv="contact.github"></span></a>
        <span style="color:var(--muted)"><i class="fa-solid fa-location-dot"></i> <span data-cv="contact.location"></span></span>
      </div>
    </header>
    <div class="grid" data-cv-list="projects">
      <article class="card">
        <h3><i class="fa-solid fa-diagram-project"></i> <span data-cv-field="title"></span></h3>
        <div class="meta">Featured case study</div>
        <p data-cv-field="description"></p>
        <div class="link"><a data-cv-field="link" href="#">Repository</a></div>
      </article>
    </div>
    <div class="skills">
      <h2>STACK & TOOLS</h2>
      <div class="pill-row" data-cv-pills data-pill-class="pill"></div>
    </div>
    <div class="foot"><span data-cv="footerUrl"></span><span data-cv="footerBrand"></span></div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>
    bindResume().then(function () {
      var map = {
        email: function (t) { return 'mailto:' + t; },
        linkedin: function (t) { return t.indexOf('http') === 0 ? t : 'https://' + t; },
        github: function (t) { return t.indexOf('http') === 0 ? t : 'https://' + t; }
      };
      document.querySelectorAll('[data-profile-link]').forEach(function (a) {
        var k = a.getAttribute('data-profile-link');
        var span = a.querySelector('span');
        var t = span && span.textContent;
        if (t && map[k]) a.setAttribute('href', map[k](t));
      });
    });
  </script>
</body>
</html>
