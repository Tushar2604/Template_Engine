<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Brandon Hale layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-sidebar:#1e3a5f;--t-accent:#5dade2;--t-muted:#7f8c8d;--t-accent-2:#5dade2;--t-teal:#004d4d;--t-cyan:#00a8c5;--t-ink:#1e3a5f;}</style>
  <style>
    :root {
      --header: var(--t-sidebar);
      --heading: var(--t-ink);
      --light-blue: var(--t-accent-2);
      --muted: var(--t-muted);
      --body: #2c3e50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter system-ui sans-serif; background: #ecf0f1; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { width: 210mm; min-height: 297mm; margin: 12px auto; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,.1); }
    .head {
      background: var(--header);
      color: #fff;
      padding: 26px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .head-text h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: .08em; margin-bottom: 8px; }
    .head-text .sub { font-size: .88rem; font-weight: 400; opacity: .95; line-height: 1.35; max-width: 520px; }
    .head-contact { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 28px; font-size: .78rem; margin-top: 14px; opacity: .95; }
    .head-contact div { display: flex; align-items: center; gap: 8px; }
    .head-contact i { opacity: .85; width: 16px; }
    .head img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,.35); flex-shrink: 0; }
    .grid { display: flex; min-height: 220mm; }
    .col-l { width: 60%; padding: 22px 24px 20px 28px; border-right: 1px solid #e8edf2; }
    .col-r { width: 40%; padding: 22px 28px 20px 24px; }
    .sec { margin-bottom: 20px; }
    .sec h2 {
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--heading);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--light-blue);
    }
    .exp { margin-bottom: 16px; }
    .exp .job { font-size: .88rem; font-weight: 700; color: var(--light-blue); margin-bottom: 2px; }
    .exp .co { font-size: .82rem; font-weight: 700; color: #2c3e50; margin-bottom: 6px; }
    .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: .72rem; color: var(--muted); margin-bottom: 8px; }
    .meta span { display: inline-flex; align-items: center; gap: 4px; }
    .exp ul { margin-left: 18px; font-size: .78rem; line-height: 1.45; color: var(--body); }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { font-size: .72rem; padding: 5px 10px; border: 1px solid #dce4ec; border-radius: 3px; color: #34495e; }
    .summary-r { font-size: .78rem; line-height: 1.55; color: var(--body); }
    .ico-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
    .ico-row .fa-stack { font-size: .65rem; }
    .ico-row h3 { font-size: .8rem; font-weight: 700; color: var(--heading); margin-bottom: 4px; }
    .ico-row p { font-size: .75rem; color: var(--body); line-height: 1.45; }
    .ico-row i.left-ico { color: var(--header); margin-top: 4px; font-size: .9rem; }
    .course-r h3 { font-size: .8rem; font-weight: 700; color: var(--heading); margin-bottom: 4px; }
    .course-r p { font-size: .75rem; color: var(--body); line-height: 1.45; margin-bottom: 12px; }
    .foot { padding: 12px 28px 16px; display: flex; justify-content: space-between; font-size: .65rem; color: #95a5a6; border-top: 1px solid #ecf0f1; }
    @media print { body{background:#fff;} .sheet{box-shadow:none;margin:0;} }
  </style>
</head>
<body>
  <div class="sheet">
    <header class="head">
      <div class="head-text">
        <h1 data-cv="fullNameUpper">NAME</h1>
        <p class="sub" data-cv="professionalTitleBrandon"></p>
        <div class="head-contact">
          <div><i class="fa-solid fa-phone"></i> <span data-cv="contact.phone"></span></div>
          <div><i class="fa-regular fa-envelope"></i> <span data-cv="contact.email"></span></div>
          <div><i class="fa-brands fa-linkedin-in"></i> <span data-cv="contact.linkedin"></span></div>
          <div><i class="fa-solid fa-location-dot"></i> <span data-cv="contact.location"></span></div>
        </div>
      </div>
      <img data-cv-photo src="" alt="" />
    </header>
    <div class="grid">
      <div class="col-l">
        <section class="sec">
          <h2>Experience</h2>
          <div data-cv-list="experience">
            <div class="exp">
              <div class="job" data-cv-field="title"></div>
              <div class="co" data-cv-field="company"></div>
              <div class="meta">
                <span><i class="fa-regular fa-calendar"></i> <span data-cv-field="start"></span> – <span data-cv-field="end"></span></span>
                <span><i class="fa-solid fa-location-dot"></i> <span data-cv-field="location"></span></span>
              </div>
              <ul data-cv-each="bullets"><li></li></ul>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Education</h2>
          <div data-cv-list="education">
            <div class="exp">
              <div class="job" data-cv-field="degree"></div>
              <div class="co" data-cv-field="school"></div>
              <div class="meta">
                <span><i class="fa-regular fa-calendar"></i> <span data-cv-field="start"></span> – <span data-cv-field="end"></span></span>
                <span><i class="fa-solid fa-location-dot"></i> <span data-cv-field="location"></span></span>
              </div>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Skills</h2>
          <div class="pills" data-cv-pills></div>
        </section>
      </div>
      <div class="col-r">
        <section class="sec">
          <h2>Summary</h2>
          <p class="summary-r" data-cv="summary"></p>
        </section>
        <section class="sec">
          <h2>Key Achievements</h2>
          <div data-cv-list="achievements">
            <div class="ico-row">
              <i data-cv-fa="icon" class="left-ico fa-solid fa-star"></i>
              <div>
                <h3 data-cv-field="title"></h3>
                <p data-cv-field="description"></p>
              </div>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Courses</h2>
          <div data-cv-list="courses" class="course-r">
            <div>
              <h3 data-cv-field="title"></h3>
              <p data-cv-field="description"></p>
            </div>
          </div>
        </section>
        <section class="sec">
          <h2>Passions</h2>
          <div data-cv-list="passions">
            <div class="ico-row">
              <i data-cv-fa="icon" class="left-ico fa-solid fa-heart"></i>
              <div>
                <h3 data-cv-field="title"></h3>
                <p data-cv-field="description"></p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <div class="foot"><span data-cv="footerUrl"></span><span data-cv="footerBrand"></span></div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
