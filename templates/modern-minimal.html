<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Modern Minimal layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-sidebar:#1a3652;--t-accent:#2563eb;--t-muted:#6b7280;--t-accent-2:#3b82f6;--t-teal:#004d4d;--t-cyan:#00a8c5;--t-ink:#111827;}</style>
  <style>
    :root { --accent: var(--t-accent); --ink: var(--t-ink); --muted: var(--t-muted); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f0f0f0; color: #111827; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { width: 210mm; min-height: 297mm; margin: 12px auto; background: #fff; padding: 44px 48px 32px; box-shadow: 0 8px 40px rgba(0,0,0,.08); }

    /* Header — ultra-clean */
    .head { margin-bottom: 28px; }
    .head h1 { font-size: 2.2rem; font-weight: 700; color: var(--ink); letter-spacing: -.02em; line-height: 1.1; }
    .head .subtitle { font-size: 1rem; font-weight: 400; color: var(--accent); margin-top: 6px; letter-spacing: .01em; }
    .head .contact { display: flex; flex-wrap: wrap; gap: 6px 18px; margin-top: 14px; font-size: .76rem; color: var(--muted); }
    .head .contact span { display: inline-flex; align-items: center; gap: 5px; }
    .head .contact i { font-size: .7rem; color: var(--muted); }
    .divider { height: 1px; background: #e5e7eb; margin-bottom: 22px; }

    /* Sections */
    .sec { margin-bottom: 22px; }
    .sec h2 { font-size: .7rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .summary { font-size: .82rem; line-height: 1.6; color: #374151; }

    /* Experience */
    .exp { margin-bottom: 16px; padding-left: 14px; border-left: 2px solid var(--accent); }
    .exp .role { font-size: .86rem; font-weight: 700; color: var(--ink); }
    .exp .co-line { display: flex; justify-content: space-between; align-items: baseline; margin-top: 2px; }
    .exp .company { font-size: .82rem; font-weight: 600; color: var(--accent); }
    .exp .dates { font-size: .74rem; color: var(--muted); white-space: nowrap; }
    .exp .loc { font-size: .74rem; color: var(--muted); }
    .exp ul { margin: 6px 0 0 16px; font-size: .78rem; line-height: 1.5; color: #374151; }
    .exp ul li::marker { color: #d1d5db; }

    /* Education */
    .edu { margin-bottom: 12px; padding-left: 14px; border-left: 2px solid #e5e7eb; }
    .edu .degree { font-size: .84rem; font-weight: 700; color: var(--ink); }
    .edu .school { font-size: .8rem; color: var(--accent); font-weight: 500; margin-top: 1px; }
    .edu .meta { font-size: .74rem; color: var(--muted); margin-top: 2px; }

    /* Skills as pills */
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { font-size: .72rem; font-weight: 500; padding: 5px 12px; border-radius: 20px; background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }

    /* Achievements grid */
    .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
    .ach-card { padding: 12px 14px; border-radius: 8px; background: #f9fafb; border: 1px solid #f3f4f6; }
    .ach-card h3 { font-size: .8rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .ach-card p { font-size: .74rem; color: #6b7280; line-height: 1.4; }

    /* Languages */
    .lang-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: .78rem; }
    .lang-row .name { font-weight: 600; color: var(--ink); min-width: 80px; }
    .lang-row .bar { flex: 1; height: 6px; border-radius: 99px; background: #f3f4f6; overflow: hidden; max-width: 140px; }
    .lang-row .bar i { display: block; height: 100%; border-radius: 99px; background: var(--accent); }

    .foot { margin-top: 16px; display: flex; justify-content: space-between; font-size: .62rem; color: #d1d5db; }
    @media print { body { background: #fff; } .sheet { box-shadow: none; margin: 0; padding: 32px 36px; } }
  </style>
</head>
<body>
  <div class="sheet">
    <header class="head">
      <h1 data-cv="fullName"></h1>
      <p class="subtitle" data-cv="professionalTitle"></p>
      <div class="contact">
        <span><i class="fa-regular fa-envelope"></i> <span data-cv="contact.email"></span></span>
        <span><i class="fa-solid fa-phone"></i> <span data-cv="contact.phone"></span></span>
        <span><i class="fa-brands fa-linkedin-in"></i> <span data-cv="contact.linkedin"></span></span>
        <span><i class="fa-solid fa-location-dot"></i> <span data-cv="contact.location"></span></span>
      </div>
    </header>
    <div class="divider"></div>
    <section class="sec">
      <h2>About</h2>
      <p class="summary" data-cv="summary"></p>
    </section>
    <section class="sec">
      <h2>Experience</h2>
      <div data-cv-list="experience">
        <div class="exp">
          <div class="role" data-cv-field="title"></div>
          <div class="co-line"><span class="company" data-cv-field="company"></span><span class="dates"><span data-cv-field="start"></span> – <span data-cv-field="end"></span></span></div>
          <div class="loc" data-cv-field="location"></div>
          <ul data-cv-each="bullets"><li></li></ul>
        </div>
      </div>
    </section>
    <section class="sec">
      <h2>Education</h2>
      <div data-cv-list="education">
        <div class="edu">
          <div class="degree" data-cv-field="degree"></div>
          <div class="school" data-cv-field="school"></div>
          <div class="meta"><span data-cv-field="start"></span> – <span data-cv-field="end"></span> · <span data-cv-field="location"></span></div>
        </div>
      </div>
    </section>
    <section class="sec">
      <h2>Skills</h2>
      <div class="pills" data-cv-pills></div>
    </section>
    <section class="sec">
      <h2>Achievements</h2>
      <div class="ach-grid" data-cv-list="achievements">
        <div class="ach-card">
          <h3 data-cv-field="title"></h3>
          <p data-cv-field="description"></p>
        </div>
      </div>
    </section>
    <section class="sec">
      <h2>Languages</h2>
      <div data-cv-lang-bars></div>
    </section>
    <div class="foot"><span data-cv="footerUrl"></span><span data-cv="footerBrand"></span></div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
