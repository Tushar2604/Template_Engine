<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Classic Executive layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-sidebar:#1a3652;--t-accent:#2563eb;--t-muted:#6b7280;--t-accent-2:#3b82f6;--t-teal:#004d4d;--t-cyan:#00a8c5;--t-ink:#111827;}</style>
  <style>
    :root {
      --accent: var(--t-accent);
      --ink: var(--t-ink);
      --muted: var(--t-muted);
      --border: #c9cdd4;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', system-ui, sans-serif; background: #e8e8e8; color: var(--ink); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet {
      width: 210mm; min-height: 297mm; margin: 12px auto; background: var(--bg);
      padding: 0; box-shadow: 0 8px 40px rgba(0,0,0,.1);
    }
    .header {
      text-align: center; padding: 36px 40px 24px;
      border-bottom: 3px double var(--accent);
    }
    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem; font-weight: 700; color: var(--ink);
      letter-spacing: .04em; margin-bottom: 6px;
    }
    .header .title {
      font-size: .92rem; color: var(--accent); font-weight: 600;
      letter-spacing: .03em; margin-bottom: 14px;
    }
    .header .contact {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px 20px; font-size: .78rem; color: var(--muted);
    }
    .header .contact span {
      display: inline-flex; align-items: center; gap: 6px;
    }
    .header .contact i { color: var(--accent); font-size: .75rem; }
    .body { padding: 24px 40px 28px; }
    .sec { margin-bottom: 22px; }
    .sec h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: .88rem; font-weight: 700; letter-spacing: .06em;
      color: var(--accent); text-transform: uppercase;
      padding-bottom: 8px; border-bottom: 1.5px solid var(--border);
      margin-bottom: 14px;
    }
    .summary { font-size: .82rem; line-height: 1.6; color: #374151; text-align: justify; }
    .exp { margin-bottom: 18px; }
    .exp-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
    .exp-head .role { font-size: .88rem; font-weight: 700; color: var(--ink); }
    .exp-head .dates { font-size: .78rem; color: var(--muted); white-space: nowrap; }
    .exp .company-line { display: flex; justify-content: space-between; align-items: baseline; margin-top: 3px; }
    .exp .company { font-size: .84rem; font-weight: 600; color: var(--accent); }
    .exp .loc { font-size: .78rem; color: var(--muted); }
    .exp ul { margin: 8px 0 0 20px; font-size: .8rem; line-height: 1.5; color: #374151; }
    .exp ul li { margin-bottom: 3px; }
    .exp ul li::marker { color: var(--accent); }
    .edu { margin-bottom: 14px; }
    .edu .degree { font-size: .86rem; font-weight: 700; color: var(--ink); }
    .edu .school { font-size: .82rem; font-weight: 600; color: var(--accent); margin-top: 2px; }
    .edu .meta { font-size: .76rem; color: var(--muted); margin-top: 2px; }
    .skills-inline { font-size: .82rem; line-height: 1.6; color: #374151; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 28px; }
    .ach-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 14px; }
    .ach-item i { color: var(--accent); font-size: .9rem; margin-top: 3px; }
    .ach-item h3 { font-size: .82rem; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
    .ach-item p { font-size: .78rem; color: #374151; line-height: 1.45; }
    .cert-item { margin-bottom: 10px; }
    .cert-item h3 { font-size: .82rem; font-weight: 700; color: var(--ink); }
    .cert-item p { font-size: .76rem; color: var(--muted); line-height: 1.4; }
    .lang-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; font-size: .8rem; }
    .lang-row .name { font-weight: 700; color: var(--ink); min-width: 90px; }
    .lang-row .bar { flex: 1; height: 8px; border-radius: 99px; background: #e5e7eb; overflow: hidden; max-width: 160px; }
    .lang-row .bar i { display: block; height: 100%; background: var(--accent); border-radius: 99px; }
    .lang-row .level { font-size: .74rem; color: var(--muted); }
    .foot { padding: 14px 40px; display: flex; justify-content: space-between; font-size: .65rem; color: #9ca3af; border-top: 1px solid #e5e7eb; }
    @media print { body { background: #fff; } .sheet { box-shadow: none; margin: 0; } }
  </style>
</head>
<body>
  <div class="sheet">
    <header class="header">
      <h1 data-cv="fullName"></h1>
      <p class="title" data-cv="professionalTitle"></p>
      <div class="contact">
        <span><i class="fa-regular fa-envelope"></i> <span data-cv="contact.email"></span></span>
        <span><i class="fa-solid fa-phone"></i> <span data-cv="contact.phone"></span></span>
        <span><i class="fa-brands fa-linkedin-in"></i> <span data-cv="contact.linkedin"></span></span>
        <span><i class="fa-solid fa-location-dot"></i> <span data-cv="contact.location"></span></span>
      </div>
    </header>
    <div class="body">
      <section class="sec">
        <h2>Professional Summary</h2>
        <p class="summary" data-cv="summary"></p>
      </section>
      <section class="sec">
        <h2>Experience</h2>
        <div data-cv-list="experience">
          <div class="exp">
            <div class="exp-head"><span class="role" data-cv-field="title"></span><span class="dates"><span data-cv-field="start"></span> – <span data-cv-field="end"></span></span></div>
            <div class="company-line"><span class="company" data-cv-field="company"></span><span class="loc" data-cv-field="location"></span></div>
            <ul data-cv-each="bullets"><li></li></ul>
          </div>
        </div>
      </section>
      <section class="sec">
        <h2>Education</h2>
        <div data-cv-list="education">
          <div class="edu">
            <div class="degree" data-cv-field="degree"></div>
            <div class="school" data-cv-field="school"></div>
            <div class="meta"><span data-cv-field="start"></span> – <span data-cv-field="end"></span> · <span data-cv-field="location"></span></div>
          </div>
        </div>
      </section>
      <section class="sec">
        <h2>Key Achievements</h2>
        <div class="two-col" data-cv-list="achievements">
          <div class="ach-item">
            <i data-cv-fa="icon" class="fa-solid fa-star"></i>
            <div><h3 data-cv-field="title"></h3><p data-cv-field="description"></p></div>
          </div>
        </div>
      </section>
      <section class="sec">
        <h2>Skills</h2>
        <p class="skills-inline" data-cv="skillsInline"></p>
      </section>
      <section class="sec">
        <h2>Certifications</h2>
        <div data-cv-list="certifications">
          <div class="cert-item">
            <h3 data-cv-field="title"></h3>
            <p data-cv-field="description"></p>
          </div>
        </div>
      </section>
      <section class="sec">
        <h2>Languages</h2>
        <div data-cv-lang-bars></div>
      </section>
      <div class="foot"><span data-cv="footerUrl"></span><span data-cv="footerBrand"></span></div>
    </div>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
