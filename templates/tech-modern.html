<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Tech Modern layout</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style id="cv-bulk-theme">:root{--t-sidebar:#1a3652;--t-accent:#2563eb;--t-muted:#6b7280;--t-accent-2:#3b82f6;--t-teal:#004d4d;--t-cyan:#00a8c5;--t-ink:#111827;}</style>
  <style>
    :root { --accent: var(--t-accent); --accent2: var(--t-accent-2); --ink: var(--t-ink); --muted: var(--t-muted); --code-bg: #f8f9fb; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #e5e7eb; color: var(--ink); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { width: 210mm; min-height: 297mm; margin: 12px auto; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,.1); display: flex; overflow: hidden; }

    /* Left sidebar — dark developer feel */
    .sidebar {
      width: 32%; background: #0f172a; color: #e2e8f0; padding: 28px 20px 20px; flex-shrink: 0;
      position: relative;
    }
    .sidebar::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), #06b6d4);
    }
    .sb-name { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; margin-top: 8px; margin-bottom: 4px; color: #f1f5f9; }
    .sb-title { font-size: .76rem; color: var(--accent2); font-weight: 500; margin-bottom: 18px; line-height: 1.35; }

    .sb-sec { margin-bottom: 18px; }
    .sb-sec h2 {
      font-family: 'JetBrains Mono', monospace; font-size: .64rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: #94a3b8;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #1e293b;
    }
    .sb-sec h2::before { content: '// '; color: #475569; }

    .contact-sb { list-style: none; }
    .contact-sb li { font-size: .72rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; color: #cbd5e1; }
    .contact-sb li i { width: 14px; text-align: center; color: var(--accent2); font-size: .7rem; }

    .pill-mono { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: .64rem; font-weight: 500; padding: 3px 8px; margin: 0 4px 5px 0; border-radius: 3px; background: #1e293b; color: var(--accent2); border: 1px solid #334155; }

    .lang-sb { margin-bottom: 8px; }
    .lang-sb .name { font-size: .72rem; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; }
    .lang-sb .track { height: 4px; border-radius: 99px; background: #1e293b; overflow: hidden; }
    .lang-sb .track i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; }

    .ach-sb { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .ach-sb i { color: var(--accent2); font-size: .7rem; margin-top: 3px; }
    .ach-sb h3 { font-size: .72rem; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
    .ach-sb p { font-size: .66rem; color: #94a3b8; line-height: 1.4; }

    /* Main */
    .main { flex: 1; padding: 28px 26px 20px 22px; }
    .sec { margin-bottom: 20px; }
    .sec h2 {
      font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f1f5f9;
    }
    .summary { font-size: .8rem; line-height: 1.6; color: #374151; }

    .exp { margin-bottom: 16px; padding: 12px 14px; background: var(--code-bg); border-radius: 6px; border-left: 3px solid var(--accent); }
    .exp .role { font-size: .84rem; font-weight: 700; color: var(--ink); }
    .exp .co { font-family: 'JetBrains Mono', monospace; font-size: .78rem; font-weight: 600; color: var(--accent); margin-top: 1px; }
    .exp .meta { font-size: .7rem; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; }
    .exp .meta span { display: inline-flex; align-items: center; gap: 4px; }
    .exp .meta i { font-size: .66rem; color: #9ca3af; }
    .exp ul { margin: 6px 0 0 14px; font-size: .76rem; line-height: 1.5; color: #374151; }

    .edu { margin-bottom: 12px; padding-left: 12px; border-left: 2px solid #e5e7eb; }
    .edu .degree { font-size: .82rem; font-weight: 700; color: var(--ink); }
    .edu .school { font-family: 'JetBrains Mono', monospace; font-size: .76rem; color: var(--accent); font-weight: 600; margin-top: 1px; }
    .edu .meta { font-size: .7rem; color: var(--muted); margin-top: 1px; }

    .proj { margin-bottom: 14px; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 6px; }
    .proj h3 { font-size: .8rem; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
    .proj p { font-size: .74rem; color: var(--muted); line-height: 1.4; }
    .proj a { font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: var(--accent); text-decoration: none; margin-top: 4px; display: inline-block; }

    .foot { padding: 8px 26px; display: flex; justify-content: flex-end; font-size: .6rem; color: #d1d5db; }
    @media print { body{background:#fff;} .sheet{box-shadow:none;margin:0;} }
  </style>
</head>
<body>
  <div class="sheet">
    <aside class="sidebar">
      <div class="sb-name" data-cv="fullName"></div>
      <div class="sb-title" data-cv="professionalTitleViolet"></div>

      <div class="sb-sec">
        <h2>Contact</h2>
        <ul class="contact-sb">
          <li><i class="fa-regular fa-envelope"></i> <span data-cv="contact.email"></span></li>
          <li><i class="fa-solid fa-phone"></i> <span data-cv="contact.phone"></span></li>
          <li><i class="fa-brands fa-linkedin-in"></i> <span data-cv="contact.linkedin"></span></li>
          <li><i class="fa-brands fa-github"></i> <span data-cv="contact.github"></span></li>
          <li><i class="fa-solid fa-location-dot"></i> <span data-cv="contact.location"></span></li>
        </ul>
      </div>
      <div class="sb-sec">
        <h2>Tech Stack</h2>
        <div data-cv-tags data-tag-class="pill-mono"></div>
      </div>
      <div class="sb-sec">
        <h2>Languages</h2>
        <div data-cv-lang-list>
          <div class="lang-sb">
            <div class="name"><span data-cv-field="name"></span></div>
            <div class="track"><i style="width:80%"></i></div>
          </div>
        </div>
      </div>
      <div class="sb-sec">
        <h2>Achievements</h2>
        <div data-cv-list="achievements">
          <div class="ach-sb">
            <i data-cv-fa="icon" class="fa-solid fa-star"></i>
            <div><h3 data-cv-field="title"></h3><p data-cv-field="description"></p></div>
          </div>
        </div>
      </div>
    </aside>
    <main class="main">
      <section class="sec">
        <h2>About</h2>
        <p class="summary" data-cv="summary"></p>
      </section>
      <section class="sec">
        <h2>Experience</h2>
        <div data-cv-list="experience">
          <div class="exp">
            <div class="role" data-cv-field="title"></div>
            <div class="co" data-cv-field="company"></div>
            <div class="meta">
              <span><i class="fa-regular fa-calendar"></i> <span data-cv-field="start"></span> – <span data-cv-field="end"></span></span>
              <span><i class="fa-solid fa-location-dot"></i> <span data-cv-field="location"></span></span>
            </div>
            <ul data-cv-each="bullets"><li></li></ul>
          </div>
        </div>
      </section>
      <section class="sec">
        <h2>Education</h2>
        <div data-cv-list="education">
          <div class="edu">
            <div class="degree" data-cv-field="degree"></div>
            <div class="school" data-cv-field="school"></div>
            <div class="meta"><span data-cv-field="start"></span> – <span data-cv-field="end"></span> · <span data-cv-field="location"></span></div>
          </div>
        </div>
      </section>
      <section class="sec">
        <h2>Projects</h2>
        <div data-cv-list="projects">
          <div class="proj">
            <h3 data-cv-field="title"></h3>
            <p data-cv-field="description"></p>
            <a data-cv-attr="href" data-cv="link" data-cv-field="link"></a>
          </div>
        </div>
      </section>
      <div class="foot"><span data-cv="footerBrand"></span></div>
    </main>
  </div>
  <script src="../engine/binder.js"></script>
  <script>bindResume();</script>
</body>
</html>
